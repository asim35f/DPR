<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>TARC — Admin Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e8e6e0;font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
.screen{display:none;min-height:100vh}.screen.active{display:block}
/* PIN */
#s-pin.active{display:flex;align-items:center;justify-content:center;background:#0f1117}
.pin-wrap{text-align:center;padding:48px 24px;max-width:320px;margin:0 auto;width:100%}
.pin-icon{font-size:40px;margin-bottom:16px}
.pin-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:-.5px}
.pin-sub{font-size:13px;color:#6b7280;margin-bottom:28px}
.dots{display:flex;gap:14px;justify-content:center;margin-bottom:28px}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid #2a2d3a;transition:all .15s}
.dot.on{background:#c8922a;border-color:#c8922a;transform:scale(1.1)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto}
.pk{background:#161a24;border:1px solid #252836;border-radius:13px;padding:17px;font-size:22px;font-weight:600;color:#fff;transition:all .1s}
.pk:active{background:#252836;transform:scale(.94)}
.pk.del{font-size:17px;color:#9ca3af}
.pin-err{color:#ef4444;font-size:13px;margin-top:12px;height:20px}
/* TOPBAR */
.topbar{background:#161a24;border-bottom:1px solid #252836;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;background:#c8922a;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;flex-shrink:0}
.brand-text{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
.brand-sub{font-size:11px;color:#6b7280}
.logout-btn{background:#1e2230;border:1px solid #2a2d3a;border-radius:9px;padding:8px 14px;font-size:12px;font-weight:600;color:#9ca3af;transition:all .15s}
.logout-btn:hover{color:#fff}
.live-dot{width:8px;height:8px;border-radius:50%;background:#16a34a;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* MAIN */
.wrap{max-width:1100px;margin:0 auto;padding:24px 16px}
.adm-tabs{display:flex;gap:0;background:#161a24;border:1px solid #252836;border-radius:13px;padding:4px;margin-bottom:24px;overflow-x:auto}
.at{padding:9px 18px;border-radius:10px;border:none;background:transparent;font-size:13px;font-weight:700;color:#6b7280;white-space:nowrap;transition:all .15s}
.at.on{background:#c8922a;color:#fff}
.ac{display:none}.ac.on{display:block}
/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px}
@media(max-width:700px){.kpi-row{grid-template-columns:1fr 1fr}}
.kpi{background:#161a24;border:1px solid #252836;border-radius:12px;padding:16px}
.kpi-n{font-size:28px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1}
.kpi-l{font-size:11px;color:#6b7280;margin-top:4px}
.kpi-sub{font-size:12px;color:#c8922a;margin-top:2px;font-weight:600}
/* DATE BAR */
.date-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.date-bar input[type=date]{background:#161a24;border:1px solid #252836;border-radius:10px;padding:9px 14px;color:#fff;font-size:14px}
.date-bar input[type=date]:focus{outline:none;border-color:#c8922a}
.today-btn{background:#1e2230;border:1px solid #252836;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;color:#9ca3af;transition:all .15s}
.today-btn:hover{color:#fff}
.exp-btn{background:#1e2230;border:1px solid #252836;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;color:#9ca3af;transition:all .15s}
.exp-btn:hover{border-color:#c8922a;color:#c8922a}
/* SUP GRID */
.sup-sel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:24px}
.scard{background:#161a24;border:2px solid #252836;border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.scard:hover{border-color:#c8922a}
.scard.on{border-color:#c8922a;background:#1a1500}
.scard-av{width:54px;height:54px;border-radius:50%;margin:0 auto 9px;background:#252836;border:2px solid #2a2d3a;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#c8922a}
.scard-av img{width:100%;height:100%;object-fit:cover}
.scard-name{font-size:11px;font-weight:700;color:#e8e6e0;line-height:1.3}
.scard-cnt{font-size:10px;color:#6b7280;margin-top:2px}
.scard-done{position:absolute;top:7px;right:7px;background:#16a34a;border-radius:5px;padding:1px 5px;font-size:9px;font-weight:800;color:#fff}
/* ALL SUPS BTN */
.all-sups-btn{background:#c8922a;border:none;border-radius:12px;padding:13px 24px;font-size:15px;font-weight:800;color:#fff;margin-bottom:20px;transition:all .15s;width:100%;display:flex;align-items:center;justify-content:center;gap:10px}
.all-sups-btn:hover{background:#b07a22}
/* COMBINED VIEW */
.combined-wrap{background:#161a24;border:1px solid #252836;border-radius:16px;overflow:hidden;margin-bottom:20px}
.combined-hdr{background:#1a1f2e;padding:16px 20px;border-bottom:1px solid #252836;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.combined-hdr h2{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.5px}
.combined-hdr p{font-size:12px;color:#6b7280;margin-top:2px}
.summary-strip{display:flex;gap:10px;flex-wrap:wrap;padding:12px 20px;background:#0f1117;border-bottom:1px solid #252836}
.stat-pill{padding:4px 12px;border-radius:7px;font-size:12px;font-weight:700}
.sp-g{background:#14532d;color:#86efac}.sp-r{background:#7f1d1d;color:#fca5a5}
.sp-a{background:#451a03;color:#fcd34d}.sp-b{background:#1e3a5f;color:#93c5fd}
.sp-gray{background:#252836;color:#9ca3af}
.sup-section{border-bottom:1px solid #1e2230}
.sup-section:last-child{border-bottom:none}
.sup-sec-hdr{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;transition:background .12s;flex-wrap:wrap}
.sup-sec-hdr:hover{background:#1a1f2e}
.sup-sec-av{width:42px;height:42px;border-radius:50%;background:#252836;border:2px solid #2a2d3a;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#c8922a;flex-shrink:0}
.sup-sec-av img{width:100%;height:100%;object-fit:cover}
.sup-sec-info{flex:1;min-width:120px}
.sup-sec-info h4{font-size:14px;font-weight:800;color:#fff}
.sup-sec-info p{font-size:11px;color:#6b7280;margin-top:2px}
.sup-sec-pills{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sup-sec-body{padding:16px 20px;display:none;background:#0f1117;border-top:1px solid #1e2230}
.sup-sec-body.open{display:block}
/* REPORT CARDS */
.rpt-card{background:#161a24;border:1px solid #252836;border-radius:14px;margin-bottom:12px;overflow:hidden}
.rpt-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;border-bottom:1px solid #252836;transition:background .12s;flex-wrap:wrap;gap:8px}
.rpt-card-hdr:hover{background:#1a1f2e}
.rpt-hdr-left h3{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px}
.rpt-hdr-left p{font-size:12px;color:#6b7280;margin-top:3px}
.rpt-hdr-right{display:flex;align-items:center;gap:8px}
.locked-badge{background:#180808;border:1px solid #dc2626;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:800;color:#ef4444}
.unlocked-badge{background:#071a0d;border:1px solid #16a34a;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:800;color:#16a34a}
.unlock-btn{background:#d97706;border:none;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:800;color:#fff}
.rpt-body{padding:18px;display:none}
.rpt-body.open{display:block}
.rpt-sec{margin-bottom:16px}
.rpt-sec-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #1e2230}
.rtbl{width:100%;border-collapse:collapse;font-size:12px}
.rtbl th{background:#0f1117;padding:7px 10px;text-align:left;color:#6b7280;font-size:10px;font-weight:800;text-transform:uppercase}
.rtbl td{padding:7px 10px;border-bottom:1px solid #1e2230;color:#e8e6e0}
.rtbl tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:800}
.bg{background:#14532d;color:#86efac}.br{background:#7f1d1d;color:#fca5a5}
.by{background:#451a03;color:#fcd34d}.bb{background:#1e3a5f;color:#93c5fd}
/* MANAGEMENT */
.mgmt-card{background:#161a24;border:1px solid #252836;border-radius:14px;padding:16px;margin-bottom:12px}
.mgmt-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:1px solid #1e2230;margin-bottom:6px;background:#0f1117;flex-wrap:wrap}
.mf{background:#0f1117;border:1px solid #252836;border-radius:8px;padding:7px 10px;color:#fff;font-size:13px;flex:1;min-width:100px}
.mf:focus{outline:none;border-color:#c8922a}
.mb{background:#1e2230;border:1px solid #252836;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;color:#9ca3af;white-space:nowrap;transition:all .15s}
.mb:hover{background:#252836;color:#fff}
.mb.pri{background:#c8922a;border-color:#c8922a;color:#fff}
.mb.pri:hover{background:#b07a22}
.mb.danger{border-color:#dc2626;color:#ef4444}
.mb.danger:hover{background:#180808}
.sec-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:10px}
.save-ok{color:#16a34a;font-size:12px;margin-top:6px;display:none}
.empty{text-align:center;padding:40px;color:#4b5563;font-size:13px}
.loading-overlay{position:fixed;inset:0;background:#0f1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .3s}
.loading-overlay.hide{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid #252836;border-top-color:#c8922a;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#6b7280}
/* TIMESHEET */
.ts-tbl{width:100%;border-collapse:collapse;font-size:11px;background:#fff;color:#111;margin-top:14px}
.ts-tbl th,.ts-tbl td{border:1px solid #999;padding:4px 6px;text-align:center}
.ts-tbl th{background:#e5e5e5;font-weight:800;font-size:10px;text-transform:uppercase}
.ts-tbl td.ts-rem{text-align:left;font-weight:700;font-size:10px}
.ts-tbl tr.ts-sun td{background:#d9d9d9}
.ts-head{background:#fff;color:#111;padding:14px;border-radius:8px}
.ts-head table{width:100%;font-size:13px;margin-bottom:6px}
.ts-head td{padding:3px 6px}
.ts-head td.lbl{font-weight:800;width:160px}
.ts-sign{display:flex;justify-content:space-between;margin-top:24px;font-size:12px;color:#111}
.ts-sign div{border-top:1px solid #999;padding-top:6px;width:30%;text-align:center}
@media print{
  body *{visibility:hidden}
  #ts-output,#ts-output *{visibility:visible}
  #ts-output{position:absolute;left:0;top:0;width:100%}
  .topbar,.adm-tabs,.kpi-row,.mgmt-card{display:none!important}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading TARC Admin…</div>
</div>

<!-- PIN -->
<div id="s-pin" class="screen active">
  <div class="pin-wrap">
    <div class="pin-icon">⚙</div>
    <div class="pin-title">Admin Panel</div>
    <div class="pin-sub">TARC Daily Progress Report</div>
    <div class="dots"><div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div></div>
    <div class="pin-pad">
      <button class="pk" onclick="pk('1')">1</button><button class="pk" onclick="pk('2')">2</button><button class="pk" onclick="pk('3')">3</button>
      <button class="pk" onclick="pk('4')">4</button><button class="pk" onclick="pk('5')">5</button><button class="pk" onclick="pk('6')">6</button>
      <button class="pk" onclick="pk('7')">7</button><button class="pk" onclick="pk('8')">8</button><button class="pk" onclick="pk('9')">9</button>
      <button class="pk" onclick="pk('0')">0</button><button class="pk del" onclick="pdel()">⌫</button><div></div>
    </div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="s-admin" class="screen">
  <div class="topbar">
    <div class="brand">
      <div class="logo">T</div>
      <div><div class="brand-text">TARC Admin Panel</div><div class="brand-sub">Daily Progress Report System</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="live-dot" title="Live sync active"></div>
      <span style="font-size:11px;color:#6b7280">Live</span>
      <button class="logout-btn" onclick="logout()">Logout →</button>
    </div>
  </div>
  <div class="wrap">
    <div class="kpi-row" id="kpi-row"></div>
    <div class="adm-tabs">
      <button class="at on" onclick="adTab('reports',this)">📊 Reports</button>
      <button class="at" onclick="adTab('sups',this)">👤 Supervisors</button>
      <button class="at" onclick="adTab('machs',this)">⚙ Machines</button>
      <button class="at" onclick="adTab('labour',this)">👷 Labour</button>
      <button class="at" onclick="adTab('timesheets',this)">🗒 Timesheets</button>
      <button class="at" onclick="adTab('settings',this)">🔧 Settings</button>
    </div>

    <!-- REPORTS -->
    <div id="ac-reports" class="ac on">
      <div class="date-bar">
        <input type="date" id="rpt-date" onchange="onDateChange()">
        <button class="today-btn" onclick="setToday()">Today</button>
        <button class="exp-btn" onclick="exportCSV()">⬇ Export CSV</button>
        <button class="exp-btn" onclick="window.print()">🖨 Print</button>
      </div>
      <button class="all-sups-btn" id="all-sups-btn" onclick="showAllSups()">
        👥 All Supervisors Report — <span id="all-date-lbl"></span>
      </button>
      <div class="sup-sel-grid" id="sup-sel-grid"></div>
      <!-- Combined view -->
      <div id="combined-view" style="display:none">
        <div class="combined-wrap">
          <div class="combined-hdr">
            <div><h2>All Supervisors</h2><p id="combined-date-lbl"></p></div>
            <button class="today-btn" onclick="hideCombined()">← Individual View</button>
          </div>
          <div class="summary-strip" id="combined-summary"></div>
          <div id="combined-body"></div>
        </div>
      </div>
      <!-- Individual view -->
      <div id="indiv-view">
        <div id="indiv-hdr" style="display:none;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <div style="font-size:17px;font-weight:800;color:#fff" id="indiv-title"></div>
          <button class="today-btn" onclick="clearSupSel()">← All Supervisors</button>
        </div>
        <div id="rpt-cards"></div>
      </div>
    </div>

    <!-- SUPERVISORS -->
    <div id="ac-sups" class="ac">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="sec-lbl" style="margin:0">Manage Supervisors</div>
        <button class="mb pri" onclick="addSup()">+ Add</button>
      </div>
      <div id="sup-mgmt"></div>
    </div>

    <!-- MACHINES -->
    <div id="ac-machs" class="ac">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="sec-lbl" style="margin:0">Manage Machines & Vehicles</div>
        <button class="mb pri" onclick="addMach()">+ Add</button>
      </div>
      <div id="mach-mgmt"></div>
    </div>

    <!-- LABOUR -->
    <div id="ac-labour" class="ac">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="sec-lbl" style="margin:0">Manage Labour & Staff</div>
        <button class="mb pri" onclick="addLab()">+ Add</button>
      </div>
      <input type="text" class="mf" id="lab-srch" placeholder="Search…" oninput="renderLabMgmt()" style="margin-bottom:12px;max-width:300px;display:block">
      <div id="lab-mgmt"></div>
    </div>

    <!-- TIMESHEETS -->
    <div id="ac-timesheets" class="ac">
      <div class="mgmt-card">
        <div class="sec-lbl">Generate Timesheet</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
          <select class="mf" id="ts-type" style="max-width:160px" onchange="renderTSPicker()">
            <option value="machine">Machine / Vehicle</option>
            <option value="labour">Staff / Labour</option>
          </select>
          <select class="mf" id="ts-entity" style="max-width:260px"></select>
          <input type="month" class="mf" id="ts-month" style="max-width:160px">
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px" id="ts-header-fields"></div>
        <button class="mb pri" onclick="generateTimesheet()">Generate</button>
        <button class="exp-btn" onclick="window.print()" style="margin-left:8px">🖨 Print</button>
      </div>
      <div id="ts-output"></div>
    </div>

    <!-- SETTINGS -->
    <div id="ac-settings" class="ac">
      <div class="mgmt-card">
        <div class="sec-lbl">Admin PIN</div>
        <div style="display:flex;gap:8px">
          <input type="password" class="mf" id="new-pin" placeholder="New 4-digit PIN" maxlength="4" style="max-width:200px">
          <button class="mb pri" onclick="savePin()">Save</button>
        </div>
        <div class="save-ok" id="pin-saved">✓ PIN saved to Firestore</div>
      </div>
      <div class="mgmt-card">
        <div class="sec-lbl">Projects</div>
        <div id="proj-mgmt"></div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <input type="text" class="mf" id="new-proj" placeholder="New project name…">
          <button class="mb pri" onclick="addProj()">Add</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs, onSnapshot, serverTimestamp, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const TODAY = new Date().toISOString().split('T')[0];
let sups=[], machs=[], lab=[], projs=[];
let adminPin='0000';

let allDPRs={}; // date_supId_project -> data

// ── INIT ──
async function init(){
  try {
    const [supDoc,machDoc,labDoc,projDoc,pinDoc] = await Promise.all([
      getDoc(doc(db,'config','supervisors')),
      getDoc(doc(db,'config','machines')),
      getDoc(doc(db,'config','labour')),
      getDoc(doc(db,'config','projects')),
      getDoc(doc(db,'config','settings'))
    ]);
    sups = supDoc.exists() ? supDoc.data().list : D_SUPS;
    machs = machDoc.exists() ? machDoc.data().list : D_MACH;
    lab = labDoc.exists() ? labDoc.data().list : D_LAB;
    projs = projDoc.exists() ? projDoc.data().list : D_PROJ;
    adminPin = pinDoc.exists() ? (pinDoc.data().adminPin||'0000') : '0000';
    document.getElementById('loading').classList.add('hide');
  } catch(e){
    document.getElementById('loading').innerHTML='<div style="color:#ef4444;text-align:center;padding:20px"><div style="font-size:30px;margin-bottom:12px">⚠</div><div>Connection failed. Check internet.</div></div>';
    console.error(e);
  }
}

init();
document.getElementById('rpt-date').value = TODAY;
document.getElementById('all-date-lbl').textContent = fmtDate(TODAY);

function fmtDate(d){ return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }

// ── PIN ──
function pk(k){if(pinBuf.length>=4)return;pinBuf+=k;updDots(pinBuf.length);if(pinBuf.length===4)setTimeout(chkPin,180);}
function pdel(){if(pinBuf.length>0){pinBuf=pinBuf.slice(0,-1);updDots(pinBuf.length);}}
function updDots(n){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('on',i<n);}
window.pk=pk; window.pdel=pdel;

async function chkPin(){
  if(pinBuf===adminPin){
    document.getElementById('s-pin').classList.remove('active');
    document.getElementById('s-admin').classList.add('active');
    startLiveListener();
  } else {
    document.getElementById('pin-err').textContent='Wrong PIN.';
    pinBuf='';updDots(0);
  }
}

function logout(){
  if(unsubDPRs){unsubDPRs();unsubDPRs=null;}
  document.getElementById('s-admin').classList.remove('active');
  document.getElementById('s-pin').classList.add('active');
  pinBuf='';updDots(0);document.getElementById('pin-err').textContent='';
}
window.logout=logout;

// ── LIVE LISTENER for DPRs ──
function startLiveListener(){
  const date=document.getElementById('rpt-date').value||TODAY;
  if(unsubDPRs)unsubDPRs();
  unsubDPRs = onSnapshot(
    query(collection(db,'dprs'),where('date','==',date)),
    snap => {
      allDPRs={};
      snap.forEach(d=>{ const data=d.data(); allDPRs[data.supId+'_'+data.project]=data; });
      renderKPIs();renderSupSel();
      if(document.getElementById('combined-view').style.display!=='none') showAllSups();
      if(selSupId) renderIndivReports();
    },
    err => console.error('Listener error:',err)
  );
  renderKPIs();renderSupSel();renderSupMgmt();renderMachMgmt();renderLabMgmt();renderSettings();renderTSPicker();
  if(!document.getElementById('ts-month').value) document.getElementById('ts-month').value=tsDefaultMonth();
}

async function onDateChange(){
  document.getElementById('all-date-lbl').textContent=fmtDate(document.getElementById('rpt-date').value);
  startLiveListener();
  hideCombined();selSupId=null;
  document.getElementById('indiv-hdr').style.display='none';
  document.getElementById('rpt-cards').innerHTML='';
}
window.onDateChange=onDateChange;

// ── KPIs ──
function renderKPIs(){
  const dprs=Object.values(allDPRs);
  const present=dprs.reduce((s,d)=>s+Object.values(d.labour||{}).filter(l=>l.status==='present').length,0);
  const absent=dprs.reduce((s,d)=>s+Object.values(d.labour||{}).filter(l=>l.status==='absent').length,0);
  const fuel=dprs.reduce((s,d)=>s+Object.values(d.machines||{}).reduce((a,m)=>a+(m.fuel||0),0),0);
  document.getElementById('kpi-row').innerHTML=`
    <div class="kpi"><div class="kpi-n">${dprs.filter(d=>d.locked).length}</div><div class="kpi-l">Reports Submitted</div><div class="kpi-sub">${document.getElementById('rpt-date').value}</div></div>
    <div class="kpi"><div class="kpi-n">${present}</div><div class="kpi-l">Staff Present</div></div>
    <div class="kpi"><div class="kpi-n">${absent}</div><div class="kpi-l">Staff Absent</div></div>
    <div class="kpi"><div class="kpi-n">${fuel.toFixed(1)}</div><div class="kpi-l">Fuel (gal)</div></div>
    <div class="kpi"><div class="kpi-n">${sups.length}</div><div class="kpi-l">Supervisors</div></div>`;
}

// ── SUPERVISOR SELECTOR ──
function renderSupSel(){
  const date=document.getElementById('rpt-date').value||TODAY;
  document.getElementById('sup-sel-grid').innerHTML=sups.map(s=>{
    const done=Object.values(allDPRs).some(d=>d.supId===s.id&&d.locked);
    const cnt=Object.values(allDPRs).filter(d=>d.supId===s.id).length;
    const ini=s.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    return`<div class="scard${selSupId===s.id?' on':''}" onclick="selSup('${s.id}')">
      ${done?'<div class="scard-done">✓ Done</div>':''}
      <div class="scard-av">${s.photo?`<img src="${s.photo}">`:`<span>${ini}</span>`}</div>
      <div class="scard-name">${s.name}</div>
      <div class="scard-cnt">${cnt} report${cnt!==1?'s':''} today</div>
    </div>`;
  }).join('');
}
window.renderSupSel=renderSupSel;

function selSup(id){
  selSupId=id;hideCombined();renderSupSel();
  const s=sups.find(x=>x.id===id);
  document.getElementById('indiv-hdr').style.display='flex';
  document.getElementById('indiv-title').textContent=(s?s.name:'')+' — Reports';
  renderIndivReports();
}
window.selSup=selSup;

function clearSupSel(){
  selSupId=null;renderSupSel();
  document.getElementById('indiv-hdr').style.display='none';
  document.getElementById('rpt-cards').innerHTML='';
}
window.clearSupSel=clearSupSel;

// ── ALL SUPERVISORS COMBINED VIEW ──
function showAllSups(){
  const date=document.getElementById('rpt-date').value||TODAY;
  document.getElementById('combined-date-lbl').textContent=fmtDate(date);
  let totalPresent=0,totalAbsent=0,totalFuel=0,totalMachs=0,totalHalfday=0,totalLeave=0;
  let bodyHTML='';

  sups.forEach(s=>{
    const sdprs=Object.values(allDPRs).filter(d=>d.supId===s.id);
    const ini=s.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    if(!sdprs.length){
      bodyHTML+=`<div class="sup-section">
        <div class="sup-sec-hdr">
          <div class="sup-sec-av">${s.photo?`<img src="${s.photo}">`:`<span>${ini}</span>`}</div>
          <div class="sup-sec-info"><h4>${s.name}</h4><p>${s.role}</p></div>
          <span class="stat-pill sp-gray">Not submitted</span>
        </div>
      </div>`;
      return;
    }
    sdprs.forEach(dpr=>{
      const lv=Object.values(dpr.labour||{});
      const present=lv.filter(x=>x.status==='present').length;
      const absent=lv.filter(x=>x.status==='absent').length;
      const halfday=lv.filter(x=>x.status==='halfday').length;
      const leave=lv.filter(x=>x.status==='leave').length;
      const mv=Object.values(dpr.machines||{});
      const selM=mv.filter(m=>m.selected).length;
      const fuel=mv.reduce((s,m)=>s+(m.fuel||0),0);
      totalPresent+=present;totalAbsent+=absent;totalFuel+=fuel;totalMachs+=selM;totalHalfday+=halfday;totalLeave+=leave;

      const labRows=Object.entries(dpr.labour||{}).filter(([id,st])=>st.status);
      const machRows=Object.entries(dpr.machines||{}).filter(([id,m])=>m.selected);
      const labHTML=labRows.length?`<div class="rpt-sec"><div class="rpt-sec-title">Labour & Staff</div>
        <table class="rtbl"><thead><tr><th>Name</th><th>Designation</th><th>Category</th><th>Status</th><th>Hrs</th></tr></thead>
        <tbody>${labRows.map(([id,st])=>{
          const p=lab.find(x=>x.id===id)||{name:id,designation:'',category:''};
          const bc=st.status==='present'?'bg':st.status==='absent'?'br':st.status==='halfday'?'by':'bb';
          return`<tr><td>${p.name}</td><td>${p.designation}</td><td>${p.category}</td><td><span class="badge ${bc}">${st.status}</span></td><td>${st.hours||10}h</td></tr>`;
        }).join('')}</tbody></table></div>`:'';
      const machHTML=machRows.length?`<div class="rpt-sec"><div class="rpt-sec-title">Vehicles & Machines</div>
        <table class="rtbl"><thead><tr><th>Machine</th><th>Plate</th><th>Type</th><th>Fuel (gal)</th></tr></thead>
        <tbody>${machRows.map(([id,m])=>{const mc=machs.find(x=>x.id===id)||{name:id,plate:'',type:''};return`<tr><td>${mc.name}</td><td>${mc.plate}</td><td>${mc.type}</td><td>${m.fuel||0}</td></tr>`;}).join('')}</tbody></table></div>`:'';
      const matHTML=(dpr.materials||[]).length?`<div class="rpt-sec"><div class="rpt-sec-title">Materials</div>
        <table class="rtbl"><thead><tr><th>Material</th><th>Qty</th><th>Unit</th><th>Date</th></tr></thead>
        <tbody>${dpr.materials.map(m=>`<tr><td>${m.material}</td><td>${m.qty}</td><td>${m.unit}</td><td>${m.date}</td></tr>`).join('')}</tbody></table></div>`:'';
      const remHTML=dpr.remarks?`<div class="rpt-sec"><div class="rpt-sec-title">Remarks</div><div style="font-size:13px;color:#9ca3af;padding:8px;background:#161a24;border-radius:8px">${dpr.remarks}</div></div>`:'';

      bodyHTML+=`<div class="sup-section">
        <div class="sup-sec-hdr" onclick="togSupSec('${dpr.supId}_${dpr.project.replace(/[^a-z0-9]/gi,'_')}')">
          <div class="sup-sec-av">${s.photo?`<img src="${s.photo}">`:`<span>${ini}</span>`}</div>
          <div class="sup-sec-info"><h4>${s.name}</h4><p style="font-size:10px">${dpr.project} · ${dpr.locked?'🔒 Locked':'🔓 Open'}</p></div>
          <div class="sup-sec-pills">
            ${present?`<span class="stat-pill sp-g">✓ ${present}</span>`:''}
            ${absent?`<span class="stat-pill sp-r">✗ ${absent}</span>`:''}
            ${halfday?`<span class="stat-pill sp-a">½ ${halfday}</span>`:''}
            ${leave?`<span class="stat-pill sp-b">✈ ${leave}</span>`:''}
            ${selM?`<span class="stat-pill sp-gray">⚙ ${selM}</span>`:''}

          <div style="display:flex;gap:6px;margin-left:auto">
            ${dpr.locked?`<button class="unlock-btn" onclick="event.stopPropagation();unlockDPR('${dpr.supId}','${dpr.project}','${dpr.date}')">Unlock</button>`:
            `<span class="unlocked-badge">🔓 Open</span>`}
          </div>
        </div>
        <div class="sup-sec-body" id="ssb-${dpr.supId}_${dpr.project.replace(/[^a-z0-9]/gi,'_')}">
          ${labHTML}${machHTML}${matHTML}${remHTML}

async function exportCSV(){
  const date=document.getElementById('rpt-date').value||TODAY;
  let data=selSupId?Object.values(allDPRs).filter(d=>d.supId===selSupId):Object.values(allDPRs);
  if(!data.length){
    // Fetch all for this date from Firestore (for export beyond live cache)
    const snap=await getDocs(query(collection(db,'dprs'),where('date','==',date)));
    data=[];snap.forEach(d=>data.push(d.data()));
  }
  if(!data.length){alert('No data to export.');return;}
  let csv='Date,Supervisor,Project,Present,Absent,Half Day,Leave PK,Machines,Fuel (gal),Materials,Remarks\n';
  data.forEach(d=>{
    const lv=Object.values(d.labour||{});
    const fuel=Object.values(d.machines||{}).reduce((s,m)=>s+(m.fuel||0),0);
    const mats=(d.materials||[]).map(m=>`${m.material}:${m.qty}${m.unit}`).join('; ');
    csv+=`"${d.date}","${d.supName}","${d.project}",${lv.filter(x=>x.status==='present').length},${lv.filter(x=>x.status==='absent').length},${lv.filter(x=>x.status==='halfday').length},${lv.filter(x=>x.status==='leave').length},${Object.values(d.machines||{}).filter(m=>m.selected).length},${fuel.toFixed(1)},"${mats}","${(d.remarks||'').replace(/"/g,"'")}"\n`;
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`TARC_DPR_${selSupId?(sups.find(s=>s.id===selSupId)?.name.replace(/ /g,'_')+'_'):'ALL_'}${date}.csv`;
  a.click();
}

// init default month to current
function tsDefaultMonth(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

const DAY_NAMES=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

async function generateTimesheet(){
  const type=document.getElementById('ts-type').value;
  const entityId=document.getElementById('ts-entity').value;
  const month=document.getElementById('ts-month').value || tsDefaultMonth();
  if(!entityId){ alert('Please select an entity.'); return; }
  const [year,mon]=month.split('-').map(Number);
  const daysInMonth=new Date(year,mon,0).getDate();
  const monthPrefix=month; // 'YYYY-MM'

  // Fetch all DPRs for this month
  const snap=await getDocs(query(collection(db,'dprs'),where('date','>=',monthPrefix+'-01'),where('date','<=',monthPrefix+'-'+String(daysInMonth).padStart(2,'0'))));
  const byDate={};
  snap.forEach(d=>{ const data=d.data(); (byDate[data.date]=byDate[data.date]||[]).push(data); });

  let rows='', totalNormal=0, totalOT=0;
  for(let day=1; day<=daysInMonth; day++){
    const dateStr=monthPrefix+'-'+String(day).padStart(2,'0');
    const dow=new Date(year,mon-1,day).getDay();
    const dayName=DAY_NAMES[dow];
    const dprsForDay=byDate[dateStr]||[];
    let entry=null, projName='';
    for(const dpr of dprsForDay){
      if(type==='machine'){
        const m=(dpr.machines||{})[entityId];
        if(m&&m.selected){ entry=m; projName=dpr.project; break; }
      } else {
        const l=(dpr.labour||{})[entityId];
        if(l&&l.status){ entry=l; projName=dpr.project; break; }
      }
    }
    let start='-',finish='0.00',brk=0,normal=0,ot=0,total=0,remark=projName;
    if(entry){
      if(type==='labour' && (entry.status==='absent'||entry.status==='leave')){
        start='-';finish='0.00';brk=0;normal=0;ot=0;total=0;
        remark=projName + (entry.status==='leave'?' (Leave PK)':' (Absent)');
      } else {
        start=entry.start?fmtTime(entry.start):'-';
        finish=entry.finish?fmtTime(entry.finish):'0.00';
        brk=entry.brk!==undefined?entry.brk:1;
        normal=entry.hours!==undefined?entry.hours:0;
        ot=entry.ot!==undefined?entry.ot:0;
        total=normal+ot;
      }
    } else {
      start='-';finish='0.00';brk=0;normal=0;ot=0;total=0;
      remark=type==='labour'?'No DPR / Off':'No DPR';
    }
    totalNormal+=normal; totalOT+=ot;
    rows+=`<tr class="${dow===0?'ts-sun':''}">
      <td>${day}</td><td>${dayName}</td><td>${start}</td><td>${finish}</td><td>${brk}</td>
      <td>${normal.toFixed(2)}</td><td>${ot?ot.toFixed(2):'-'}</td><td>${total.toFixed(2)}</td>
      <td class="ts-rem">${remark}</td>
    </tr>`;
  }

  const monthLabel=new Date(year,mon-1,1).toLocaleDateString('en-GB',{month:'short',year:'2-digit'});
  let headHTML='';
  if(type==='machine'){
    const m=machs.find(x=>x.id===entityId)||{};
    const mob=document.getElementById('ts-mob')?.value||'';
    const supplier=document.getElementById('ts-supplier')?.value||'';
    headHTML=`<table>
      <tr><td class="lbl">Machine Name</td><td>${m.name||''}</td><td class="lbl">Month</td><td>${monthLabel}</td></tr>
      <tr><td class="lbl">Plate Number</td><td>${m.plate||''}</td><td class="lbl">Supplier Name</td><td>${supplier}</td></tr>
      <tr><td class="lbl">Mobilization By</td><td>${mob}</td><td></td><td></td></tr>
    </table>`;
  } else {
    const p=lab.find(x=>x.id===entityId)||{};
    const desig=document.getElementById('ts-desig')?.value||p.designation||'';
    headHTML=`<table>
      <tr><td class="lbl">Name</td><td>${p.name||''}</td><td class="lbl">Month</td><td>${monthLabel}</td></tr>
      <tr><td class="lbl">Designation</td><td>${desig}</td><td></td><td></td></tr>
    </table>`;
  }

  document.getElementById('ts-output').innerHTML=`
    <div class="ts-head">
      ${headHTML}
      <table class="ts-tbl">
        <thead><tr><th>Date</th><th>Day</th><th>Start Time</th><th>Finish Time</th><th>Break</th><th>Normal</th><th>Overtime</th><th>Total</th><th>Remarks</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr><td colspan="5" style="text-align:right;font-weight:800">TOTAL</td><td style="font-weight:800">${totalNormal.toFixed(2)}</td><td style="font-weight:800">${totalOT?totalOT.toFixed(2):'-'}</td><td style="font-weight:800">${(totalNormal+totalOT).toFixed(2)}</td><td></td></tr></tfoot>
      </table>
      <div class="ts-sign"><div>Prepared By</div><div>Checked By</div><div>Manager Signature</div></div>
    </div>`;
}
window.generateTimesheet=generateTimesheet;

function fmtTime(t){
  // t is 'HH:MM' -> convert to H.MM like sample (6.30)
  const [h,m]=t.split(':');
  return parseInt(h)+'.'+m;
}
